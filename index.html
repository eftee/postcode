
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Postcode Analyse – Live PC4 (Esri NL)</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Rabobank kleur (benadering) -->
  <style>
    :root { --rabo-orange: #FF6600; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

<div class="max-w-6xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-2" style="color: var(--rabo-orange)">
    Postcode Analyse (PC4) – Live ArcGIS
  </h1>
  <p class="mb-6">Gemeente → officiële PC4‑postcodevlakken (Esri Nederland)</p>

  <!-- Controls -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
    <div>
      <label class="font-semibold">Gemeente</label>
      <select id="city" class="mt-1 w-full border p-2 rounded">
        <option value="">-- kies --</option>
        <option>Amsterdam</option>
        <option>Rotterdam</option>
        <option>Den Haag</option>
        <option>Utrecht</option>
        <option>Eindhoven</option>
      </select>
    </div>

    <div>
      <label class="font-semibold">Zoek postcode (PC4)</label>
      <input id="postcode" class="mt-1 w-full border p-2 rounded" placeholder="1012" maxlength="4" />
    </div>

    <div class="flex items-end gap-2">
      <button id="btnCsv" class="px-4 py-2 rounded text-white" style="background: var(--rabo-orange)">
        Export CSV
      </button>
      <button id="btnGeo" class="px-4 py-2 rounded border">
        Export GeoJSON
      </button>
    </div>
  </div>

  <!-- Result -->
  <div id="result" class="mb-4 p-4 rounded bg-white shadow">Maak een selectie.</div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div>
      <h2 class="font-bold mb-2">PC4‑postcodes</h2>
      <ul id="postcodeList" class="bg-white p-3 rounded shadow max-h-72 overflow-auto"></ul>
    </div>

    <div>
      <h2 class="font-bold mb-2">Kaart</h2>
      <div id="map" class="h-72 rounded"></div>
    </div>
  </div>

  <p class="text-xs text-gray-600 mt-6">
    Bron: Esri Nederland – Postcodevlakken PC4 (BAG / TOP10NL). Gebruik conform Esri NL Terms of Use.
  </p>
</div>

<script>
  /* =====================
     Config
  ===================== */
  const SERVICE_URL = "https://services.arcgis.com/nSZVuSZjHpEZZbRo/ArcGIS/rest/services/Postcodevlakken_PC4/FeatureServer/0/query";

  /* =====================
     State
  ===================== */
  let lastGeoJSON = null;
  let postcodeLayer = null;

  /* =====================
     DOM
  ===================== */
  const citySelect   = document.getElementById('city');
  const postcodeInput = document.getElementById('postcode');
  const resultDiv    = document.getElementById('result');
  const listEl       = document.getElementById('postcodeList');

  /* =====================
     Map init
  ===================== */
  const map = L.map('map').setView([52.1, 5.1], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  /* =====================
     Data loading
  ===================== */
  async function loadGemeente(gemeente) {
    resultDiv.textContent = 'Bezig met laden…';
    listEl.innerHTML = '';

    const url = SERVICE_URL
      + '?where=' + encodeURIComponent(`Gemeentenaam='${gemeente}'`)
      + '&outFields=Postcode4,Gemeentenaam'
      + '&f=geojson';

    const response = await fetch(url);
    const geojson  = await response.json();

    lastGeoJSON = geojson;

    // Unieke PC4‑codes
    const pc4s = [...new Set(
      geojson.features.map(f => String(f.properties.Postcode4))
    )].sort();

    pc4s.forEach(pc => {
      const li = document.createElement('li');
      li.textContent = pc;
      listEl.appendChild(li);
    });

    if (postcodeLayer) postcodeLayer.remove();
    postcodeLayer = L.geoJSON(geojson, {
      style: {
        color: '#FF6600',
        weight: 1,
        fillOpacity: 0.4
      },
      onEachFeature: (feature, layer) => {
        layer.bindPopup(`PC4: ${feature.properties.Postcode4}`);
      }
    }).addTo(map);

    map.fitBounds(postcodeLayer.getBounds());
    resultDiv.textContent = `${pc4s.length} PC4‑postcodes gevonden in ${gemeente}.`;
  }

  function validatePostcode() {
    const pc = postcodeInput.value;
    if (!lastGeoJSON || pc.length !== 4) return;

    const found = lastGeoJSON.features.some(
      f => String(f.properties.Postcode4) === pc
    );

    resultDiv.innerHTML = found
      ? `✅ <strong>${pc}</strong> ligt in <strong>${citySelect.value}</strong>.`
      : `❌ <strong>${pc}</strong> ligt niet in <strong>${citySelect.value}</strong>.`;
  }

  /* =====================
     Export
  ===================== */
  document.getElementById('btnCsv').addEventListener('click', () => {
    if (!lastGeoJSON) return alert('Geen data om te exporteren');

    const rows = ['Postcode4,Gemeente'];
    lastGeoJSON.features.forEach(f => {
      rows.push(`${f.properties.Postcode4},${f.properties.Gemeentenaam}`);
    });

    downloadFile('pc4_export.csv', rows.join('\n'));
  });

  document.getElementById('btnGeo').addEventListener('click', () => {
    if (!lastGeoJSON) return alert('Geen data om te exporteren');
    downloadFile('pc4_export.geojson', JSON.stringify(lastGeoJSON, null, 2));
  });

  function downloadFile(filename, content) {
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  /* =====================
     Events
  ===================== */
  citySelect.addEventListener('change', () => {
    if (citySelect.value) loadGemeente(citySelect.value);
  });

  postcodeInput.addEventListener('input', validatePostcode);
</script>

</body>
</html>
