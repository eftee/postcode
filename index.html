<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Postcodes per woonplaats (Nederland)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Zoek alle postcodes (PC4) per Nederlandse woonplaats op basis van actuele BAG- en CBS-data." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Postcodes per woonplaats</h1>
    <p class="intro">
      Zoek Nederlandse woonplaatsen en krijg alle bijbehorende postcodes (PC4).
      Gebaseerd op actuele open data (BAG & CBS).
    </p>

    <div class="search">
      <input
        id="plaatsInput"
        type="text"
        placeholder="Bijvoorbeeld: Ermelo"
        autocomplete="off"
      />
      <button id="zoekBtn">Zoeken</button>
    </div>

    <div id="status" class="status"></div>

    <section id="resultaat" class="resultaat"></section>
  </main>

  <footer>
    <p>
      Data via BAG & CBS (ArcGIS) ·
      Geen officiële postcodelijst van PostNL
    </p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
