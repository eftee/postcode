<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Gemeente & Postcode Zoeker</title>

  <!-- ✅ Tailwind correct -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    #map { height: 420px }
  </style>
</head>
<body class="bg-gray-50 p-6">

<h1 class="text-3xl font-bold mb-4">Gemeente – Postcode (PC4)</h1>

<div class="grid grid-cols-3 gap-4 mb-4">
  <select id="gemeente" class="border p-2 rounded"></select>
  <input id="pc4" class="border p-2 rounded" placeholder="1012"/>
  <button id="export" class="bg-orange-500 text-white p-2 rounded">Export CSV</button>
</div>

<div id="result" class="mb-3"></div>
<ul id="lijst" class="mb-4 list-disc pl-5"></ul>
<div id="map"></div>

<script>
/* ---- CONFIG ---- */
const POSTCODEPUNTEN =
  "https://services.arcgis.com/nSZVuSZjHpEZZbRo/arcgis/rest/services/Postcodepunten/FeatureServer/0/query";
const PC4_VLAKKEN =
  "https://services.arcgis.com/nSZVuSZjHpEZZbRo/ArcGIS/rest/services/Postcodevlakken_PC4/FeatureServer/0/query";

/* ---- MAP ---- */
const map = L.map("map").setView([52.1,5.1],7);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let features = [];
let layerGroup = L.layerGroup().addTo(map);

/* ---- GEMEENTEN LADEN ---- */
(async () => {
  const r = await fetch(
    POSTCODEPUNTEN +
    "?where=1=1&outFields=GM_NAAM&f=json"
  );
  const j = await r.json();
  const set = [...new Set(j.features.map(f => f.attributes.GM_NAAM))].sort();

  const sel = document.getElementById("gemeente");
  sel.innerHTML = "<option value=''>Kies gemeente</option>";
  set.forEach(g => sel.innerHTML += `<option>${g}</option>`);
})();

/* ---- ZOEK OP GEMEENTE ---- */
document.getElementById("gemeente").onchange = async e => {
  if (!e.target.value) return;
  document.getElementById("pc4").value = "";

  const q =
    POSTCODEPUNTEN +
    "?where=" + encodeURIComponent(`GM_NAAM='${e.target.value}'`) +
    "&outFields=PC4,GM_NAAM&returnGeometry=true&f=json";

  const r = await fetch(q);
  const j = await r.json();
  features = j.features;
  render(`PC4 in ${e.target.value}`);
};

/* ---- ZOEK OP PC4 ---- */
document.getElementById("pc4").onchange = async e => {
  if (e.target.value.length !== 4) return;

  const q =
    POSTCODEPUNTEN +
    "?where=" + encodeURIComponent(`PC4='${e.target.value}'`) +
    "&outFields=PC4,GM_NAAM&returnGeometry=true&f=json";

  const r = await fetch(q);
  const j = await r.json();
  features = j.features;
  render(`Resultaat voor PC4 ${e.target.value}`);
};

/* ---- RENDER ---- */
function render(titel) {
  document.getElementById("result").textContent = titel;
  document.getElementById("lijst").innerHTML = "";
  layerGroup.clearLayers();

  const pcs = [...new Set(features.map(f => f.attributes.PC4))];
  pcs.forEach(p => document.getElementById("lijst").innerHTML += `<li>${p}</li>`);

  features.forEach(f => {
    L.circleMarker([f.geometry.y, f.geometry.x], {radius:5})
     .bindPopup(`${f.attributes.PC4} – ${f.attributes.GM_NAAM}`)
     .addTo(layerGroup);
  });

  if (layerGroup.getLayers().length)
    map.fitBounds(layerGroup.getBounds().pad(0.2));
}

/* ---- EXPORT ---- */
document.getElementById("export").onclick = () => {
  if (!features.length) return;
  const rows = ["PC4,Gemeente"];
  [...new Map(features.map(f => [f.attributes.PC4, f.attributes.GM_NAAM]))]
    .forEach(([p,g]) => rows.push(`${p},${g}`));
  const blob = new Blob([rows.join("\n")],{type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "resultaat_pc4.csv";
  a.click();
};
</script>
</body>
</html>
