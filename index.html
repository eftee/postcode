<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Gemeente–Postcode Zoeker (PC4)</title>

  <!-- ✅ Tailwind correct -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    #map { height: 420px; }
  </style>
</head>
<body class="bg-gray-50 p-6 text-gray-900">

<h1 class="text-3xl font-bold mb-4">Gemeente – Postcode (PC4)</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
  <input id="gemeente"
         class="border p-2 rounded"
         placeholder="Typ gemeentenaam en druk Enter (bijv. Utrecht)" />

  <input id="pc4"
         class="border p-2 rounded"
         placeholder="PC4 (bijv. 1012)"
         maxlength="4" />

  <button id="export"
          class="bg-orange-500 text-white p-2 rounded">
          Export CSV
  </button>
</div>

<div id="status" class="mb-3 font-medium"></div>
<ul id="lijst" class="list-disc pl-5 mb-4"></ul>
<div id="map"></div>

<script>
/* ---------------- CONFIG ---------------- */
const POSTCODEPUNTEN =
  "https://services.arcgis.com/nSZVuSZjHpEZZbRo/arcgis/rest/services/Postcodepunten/FeatureServer/0/query";

/* ---------------- MAP ---------------- */
const map = L.map("map").setView([52.1, 5.1], 7);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
let layer = L.layerGroup().addTo(map);

/* ---------------- STATE ---------------- */
let features = [];

/* ---------------- ZOEK GEMEENTE ---------------- */
document.getElementById("gemeente").addEventListener("keydown", async e => {
  if (e.key !== "Enter") return;
  document.getElementById("pc4").value = "";
  await zoekGemeente(e.target.value.trim());
});

async function zoekGemeente(naam) {
  if (!naam) return;

  document.getElementById("status").textContent = "Zoeken…";
  document.getElementById("lijst").innerHTML = "";
  layer.clearLayers();

  const where =
    `UPPER(GM_NAAM) LIKE '%${naam.toUpperCase()}%'`;

  const url =
    POSTCODEPUNTEN +
    "?where=" + encodeURIComponent(where) +
    "&outFields=PC4,GM_NAAM" +
    "&returnGeometry=true&f=json";

  const r = await fetch(url);
  const j = await r.json();
  features = j.features || [];

  renderResult();
}

/* ---------------- ZOEK PC4 ---------------- */
document.getElementById("pc4").addEventListener("keydown", async e => {
  if (e.key !== "Enter") return;
  document.getElementById("gemeente").value = "";
  await zoekPC4(e.target.value.trim());
});

async function zoekPC4(pc4) {
  if (pc4.length !== 4) return;

  document.getElementById("status").textContent = "Zoeken…";
  document.getElementById("lijst").innerHTML = "";
  layer.clearLayers();

  const url =
    POSTCODEPUNTEN +
    "?where=" + encodeURIComponent(`PC4='${pc4}'`) +
    "&outFields=PC4,GM_NAAM" +
    "&returnGeometry=true&f=json";

  const r = await fetch(url);
  const j = await r.json();
  features = j.features || [];

  renderResult();
}

/* ---------------- RENDER ---------------- */
function renderResult() {
  if (!features.length) {
    document.getElementById("status").textContent =
      "Geen resultaten gevonden.";
    return;
  }

  const uniekePC4 =
    [...new Set(features.map(f => f.attributes.PC4))];

  document.getElementById("status").textContent =
    `${uniekePC4.length} PC4 gevonden`;

  uniekePC4.forEach(p =>
    document.getElementById("lijst").innerHTML += `<li>${p}</li>`
  );

  features.forEach(f => {
    L.circleMarker(
      [f.geometry.y, f.geometry.x],
      { radius: 5 }
    )
    .bindPopup(`${f.attributes.PC4}<br>${f.attributes.GM_NAAM}`)
    .addTo(layer);
  });

  map.fitBounds(layer.getBounds().pad(0.2));
}

/* ---------------- EXPORT ---------------- */
document.getElementById("export").onclick = () => {
  if (!features.length) return;

  const rows = ["PC4,Gemeente"];
  [...new Map(features.map(f =>
     [f.attributes.PC4, f.attributes.GM_NAAM]))]
    .forEach(([p,g]) => rows.push(`${p},${g}`));

  const blob = new Blob([rows.join("\n")],{type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "pc4_resultaat.csv";
  a.click();
};
</script>

</body>
</html>
